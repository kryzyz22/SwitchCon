name: Build ESP32 Firmware

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Compile with ESP-IDF (Legacy Make)
      uses: docker://espressif/idf:release-v4.4
      with:
        entrypoint: /bin/bash
        args: -c "git config --global --add safe.directory '*' && . $IDF_PATH/export.sh && cd ESP32/source/firmware && make"

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: esp32-switch-firmware
        path: |
          ESP32/source/firmware/*.bin
          ESP32/source/firmware/build/*.bin
          ESP32/source/firmware/build/bootloader/*.bin
