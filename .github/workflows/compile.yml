name: Build ESP32 Firmware

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Compile ESP-IDF Project
      uses: espressif/idf-build-apps@v2
      with:
        path: 'ESP32/source/firmware'
        target: 'esp32'

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: esp32-switch-firmware
        path: |
          ESP32/source/firmware/build/*.bin
          ESP32/source/firmware/build/partition_table/*.bin
          ESP32/source/firmware/build/bootloader/*.bin
